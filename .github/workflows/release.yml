name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン名（例: v1.2.0）。空の場合は manifest.json のバージョンを使用'
        required: false
        type: string

permissions: {}

jobs:
  # タグ push 時: ZIP生成 + Attestation + GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag name
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! printf '%s\n' "${TAG_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag must be in 'v1.2.3' format, got: ${TAG_NAME}" >&2
            exit 1
          fi

      - name: Create distribution ZIP
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/build-dist.sh "${TAG_NAME}"

      - name: Generate attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: kantan-image-converter-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kantan-image-converter-*.zip
          generate_release_notes: true

  # 手動実行時: ZIP生成 + Actionsアーティファクトへアップロード（Attestationなし・Releaseなし）
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            # v1.2.3 形式のみ許可（それ以外は拒否）
            if ! printf '%s\n' "${INPUT_VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Error: version must be in 'v1.2.3' format, got: ${INPUT_VERSION}" >&2
              exit 1
            fi
            VERSION="${INPUT_VERSION}"
          else
            VERSION="v$(node -p "require('./manifest.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create distribution ZIP
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-dist.sh "${VERSION}"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kantan-image-converter-${{ steps.version.outputs.version }}
          path: kantan-image-converter-*.zip
          retention-days: 30
