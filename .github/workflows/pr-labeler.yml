name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

# forkからのPRでもラベル付与できるよう pull_request_target + 最小権限で構成
permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false
