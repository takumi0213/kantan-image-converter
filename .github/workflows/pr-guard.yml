name: PR Guard

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]
    paths:
      - "manifest.json"
      - "background.js"
      - "docs/popup.html"
      - "docs/popup.js"

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    name: Post Review Checklist
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Detect changed files
        id: changes
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              }
            );
            const names = files.map(f => f.filename);

            const manifest   = names.includes("manifest.json");
            const background = names.includes("background.js");
            const popup      = names.some(n => n === "docs/popup.html" || n === "docs/popup.js");

            core.setOutput("manifest",   String(manifest));
            core.setOutput("background", String(background));
            core.setOutput("popup",      String(popup));

      # manifest.json が変更された場合のみコメント
      - name: Comment – manifest changed
        if: steps.changes.outputs.manifest == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## 📋 manifest.json 変更チェックリスト",
              "",
              "manifest.json が変更されています。以下を確認してください。",
              "",
              "- [ ] 追加・変更した権限は最小限か（`host_permissions` を使っていないか）",
              "- [ ] `background.service_worker` の参照先ファイルが存在するか",
              "- [ ] `action.default_popup` の参照先ファイルが存在するか",
              "- [ ] アイコンファイル（16/48/128px）が揃っているか",
              "- [ ] `SECURITY.md` の権限説明と整合が取れているか",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # background.js が変更された場合のみコメント
      - name: Comment – background changed
        if: steps.changes.outputs.background == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## 🔍 background.js 変更チェックリスト",
              "",
              "background.js が変更されています。通常のWebページで以下を手動確認してください。",
              "",
              "**変換・保存**",
              "- [ ] PNG として保存が正常に動作する",
              "- [ ] JPG として保存が正常に動作する",
              "- [ ] WebP として保存が正常に動作する",
              "",
              "**フォールバック**",
              "- [ ] `chrome://` 等の制限ページで元画像がダウンロードされる（エラーなし）",
              "- [ ] CORS制限がある画像でフォールバックが動作する",
              "",
              "**特殊ケース**",
              "- [ ] アニメーションGIF が変換されずそのまま保存される",
              "- [ ] SVG 画像が変換されずそのまま保存される",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # docs/popup.html または docs/popup.js が変更された場合のみコメント
      - name: Comment – popup changed
        if: steps.changes.outputs.popup == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## 🖼️ ポップアップ変更チェックリスト",
              "",
              "docs/popup.html または docs/popup.js が変更されています。拡張機能を読み込んで以下を手動確認してください。",
              "",
              "- [ ] ポップアップが正しく表示される",
              "- [ ] 「デモ・使い方ガイド」リンクが正しく開く",
              "- [ ] 「紹介ページ」リンクが正しく開く",
              "- [ ] 「GitHub」リンクが正しく開く",
              "- [ ] バージョン番号が正しく表示される",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
