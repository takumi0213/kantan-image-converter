name: PR Guard
 
on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]
    paths:
      - "manifest.json"
      - "background.js"
      - "docs/popup.html"
      - "docs/popup.js"
      - "website/**"
      - "icons/**"
 
permissions:
  contents: read
  pull-requests: write
 
jobs:
  guard:
    name: Post Review Checklist
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    continue-on-error: true
 
    steps:
      - name: Detect changed files
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              }
            );
            const names = files.map(f => f.filename);
 
            const manifest   = names.includes("manifest.json");
            const background = names.includes("background.js");
            const popup      = names.some(n => n === "docs/popup.html" || n === "docs/popup.js");
            const website    = names.some(n => n.startsWith("website/"));
            const icons      = names.some(n => n.startsWith("icons/"));
 
            core.setOutput("manifest",   String(manifest));
            core.setOutput("background", String(background));
            core.setOutput("popup",      String(popup));
            core.setOutput("website",    String(website));
            core.setOutput("icons",      String(icons));
 
      # manifest.json が変更された場合のみコメント
      - name: Comment – manifest changed
        if: steps.changes.outputs.manifest == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "## 📋 manifest.json 変更チェックリスト",
              "",
              "manifest.json が変更されています。以下を確認してください。",
              "",
              "- [ ] 追加・変更した権限は最小限か（`host_permissions` を使っていないか）",
              "- [ ] 参照先ファイル（`background.service_worker` / `action.default_popup` / アイコン）が存在するか",
              "- [ ] アイコンファイル（16/48/128px）が揃っているか",
              "- [ ] `SECURITY.md` の権限説明と整合が取れているか",
            ].join("\n");
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
 
      # background.js が変更された場合のみコメント
      - name: Comment – background changed
        if: steps.changes.outputs.background == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "## 🔍 background.js 変更チェックリスト",
              "",
              "background.js が変更されています。通常のWebページで以下を手動確認してください。",
              "",
              "**変換・保存**",
              "- [ ] PNG・JPG・WebP の全フォーマットで変換・保存が正常に動作する",
              "- [ ] 保存ダイアログ（名前を付けて保存）が表示される",
              "- [ ] 透過PNG → JPG 変換時、透過部分が白背景で描画される",
              "",
              "**フォールバック**",
              "- [ ] `chrome://`・`moz-extension://` 等の制限ページで元画像がダウンロードされる（エラーなし）",
              "- [ ] CORS制限がある画像でフォールバックが動作する",
              "",
              "**特殊ケース**",
              "- [ ] アニメーションGIF / SVG がそのまま保存される",
              "",
              "**エラー**",
              "- [ ] すべての変換が失敗した場合、バッジアイコンが赤くなる（Service Worker DevTools でエラーを確認）",
            ].join("\n");
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
 
      # docs/popup.html または docs/popup.js が変更された場合のみコメント
      - name: Comment – popup changed
        if: steps.changes.outputs.popup == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "## 🖼️ ポップアップ変更チェックリスト",
              "",
              "docs/popup.html または docs/popup.js が変更されています。拡張機能を読み込んで以下を手動確認してください。",
              "",
              "- [ ] ポップアップが正しく表示される",
              "- [ ] 「デモ・使い方ガイド」リンクが意図したページに開く",
              "- [ ] 「紹介ページ」リンクが意図したページに開く",
              "- [ ] 「GitHub」リンクが意図したページに開く",
              "- [ ] バージョン番号が `manifest.json` のバージョンと一致している",
            ].join("\n");
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
 
      # website/ が変更された場合のみコメント
      - name: Comment – website changed
        if: steps.changes.outputs.website == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "## 🌐 紹介ページ変更チェックリスト",
              "",
              "website/ が変更されています。以下を手動確認してください。",
              "",
              "- [ ] ブラウザで直接開きレイアウト崩れがない",
              "- [ ] モバイル幅（680px以下）でレイアウト崩れがない",
              "- [ ] ブラウザのタブに favicon が表示される",
            ].join("\n");
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
 
      # icons/ が変更された場合のみコメント
      - name: Comment – icons changed
        if: steps.changes.outputs.icons == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              "## 🎨 アイコン変更チェックリスト",
              "",
              "icons/ が変更されています。拡張機能を読み込んで以下を手動確認してください。",
              "",
              "- [ ] ツールバーで 16px アイコンが正しく表示される",
              "- [ ] 拡張機能管理画面で 48px アイコンが正しく表示される",
              "- [ ] 128px アイコンが正しく表示される",
            ].join("\n");
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
