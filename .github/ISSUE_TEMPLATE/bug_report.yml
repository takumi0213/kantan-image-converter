name: バグ報告
description: 拡張機能の不具合を報告する
labels: ["bug"]
assignees: ["takumi0213"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。以下の情報を記入してください。
  - type: textarea
    id: description
    attributes:
      label: 現象
      description: どのような不具合が発生しましたか？
      placeholder: 例：JPGとして保存を選択したが、PNG形式で保存された
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 不具合を再現する手順を記載してください。
      placeholder: |
        1. Webページ上の画像を右クリック
        2. 「画像を変換して保存」→「JPG として保存」を選択
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動作するべきですか？
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: ブラウザ・バージョン
      placeholder: 例：Chrome 130, Vivaldi 7.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: 例：Windows 11, macOS Sequoia
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 拡張機能のバージョン
      placeholder: 例：v1.0.0
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット、エラーメッセージ（Service Worker DevTools）等があれば添付してください。
    validations:
      required: false
