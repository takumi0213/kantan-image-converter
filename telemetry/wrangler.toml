# かんたん画像変換 テレメトリプロキシ - Cloudflare Worker デプロイ設定
# セットアップ手順は別途ガイドを参照のこと。
# シークレット（GA4_MEASUREMENT_ID / GA4_API_SECRET / ALLOWED_EXTENSION_ORIGIN）は wrangler secret put で登録する。
# このファイルには機密情報を記載しないこと。
# Workers Free プランで動作する。

name       = "kantan-image-converter-telemetry"
main       = "worker.js"
compatibility_date = "2026-04-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
