<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>かんたん画像変換</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      width: 240px;
      color: #212529;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e9ecef;
    }

    .header img {
      width: 24px;
      height: 24px;
    }

    .header span {
      font-size: 14px;
      font-weight: 700;
    }

    .desc {
      padding: 10px 16px;
      font-size: 12px;
      color: #6c757d;
      line-height: 1.6;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      text-decoration: none;
      color: #212529;
      font-size: 13px;
      border-top: 1px solid #e9ecef;
      transition: background 0.1s;
    }

    .menu a:hover {
      background: #f1f3f5;
    }

    .menu a .icon {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      color: #868e96;
    }

    .version {
      padding: 8px 16px;
      font-size: 11px;
      color: #adb5bd;
      border-top: 1px solid #e9ecef;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="">
    <span>かんたん画像変換</span>
  </div>
  <div class="desc">画像を右クリック →「画像を変換して保存」から変換できます。</div>
  <div class="menu">
    <a href="demo.html" id="demoLink">
      <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="1" y="3" width="14" height="10" rx="1.5"/>
        <path d="M6 6.5l3 1.5-3 1.5V6.5z" fill="currentColor" stroke="none"/>
      </svg>
      デモ・使い方ガイド
    </a>
    <a href="https://img-convert.takumi0213.com/" id="websiteLink">
      <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="8" cy="8" r="6.5"/>
        <path d="M8 1.5C6.5 4 5.5 6 5.5 8s1 4 2.5 6.5M8 1.5C9.5 4 10.5 6 10.5 8s-1 4-2.5 6.5M1.5 8h13"/>
      </svg>
      紹介ページ

    <a href="https://github.com/takumi0213/kantan-image-converter" id="githubLink">
      <svg class="icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </div>
  <div class="version" id="version"></div>
  <script src="popup.js"></script>
</body>
</html>
