<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>かんたん画像変換 - 設定</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
      padding: 20px 24px;
      min-width: 360px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 img {
      width: 24px;
      height: 24px;
    }

    .setting-group {
      margin-bottom: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }

    .setting-group h2 {
      font-size: 14px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 12px;
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .setting-item + .setting-item {
      border-top: 1px solid #e9ecef;
      padding-top: 12px;
      margin-top: 4px;
    }

    .setting-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .setting-label span {
      font-weight: 500;
      color: #212529;
    }

    .setting-label small {
      color: #868e96;
      font-size: 12px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ced4da;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #2979c2;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .toggle input:focus-visible + .toggle-slider {
      outline: 2px solid #2979c2;
      outline-offset: 2px;
    }

    /* Status message */
    .status {
      font-size: 13px;
      color: #2b8a3e;
      opacity: 0;
      transition: opacity 0.3s;
      margin-top: 12px;
    }

    .status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>
    <img src="icons/icon48.png" alt="">
    かんたん画像変換 設定
  </h1>

  <div class="setting-group">
    <h2>保存設定</h2>

    <div class="setting-item">
      <div class="setting-label">
        <span>名前を付けて保存</span>
        <small>ONにすると毎回保存先を選択できます</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="saveAs">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-group">
    <h2>通知設定</h2>

    <div class="setting-item">
      <div class="setting-label">
        <span>完了・エラー通知</span>
        <small>保存完了やエラー時にデスクトップ通知を表示します</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="notifyOnComplete">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="status">設定を保存しました</div>

  <script src="options.js"></script>
</body>
</html>
